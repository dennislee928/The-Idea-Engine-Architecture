name: Idea Engine Ingestion Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote ingestion endpoint
        env:
          IDEA_ENGINE_INGEST_URL: ${{ secrets.IDEA_ENGINE_INGEST_URL }}
          IDEA_ENGINE_INTERNAL_TOKEN: ${{ secrets.IDEA_ENGINE_INTERNAL_TOKEN }}
        run: |
          if [ -z "$IDEA_ENGINE_INGEST_URL" ]; then
            echo "IDEA_ENGINE_INGEST_URL is not configured"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: $IDEA_ENGINE_INTERNAL_TOKEN" \
            "$IDEA_ENGINE_INGEST_URL"
